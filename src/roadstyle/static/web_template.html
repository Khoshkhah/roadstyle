<div id="map"></div><script>
const style = __STYLE__, BASEMAPS = __BASEMAPS__;
// tiles=True: the roads are an embedded-PMTiles vector source (no inline features) — reads of
// per-edge data go to the sidecar table (window.RS_SIDE), and roads feature-state needs the
// source-layer name. RS_TILED=false leaves every code path exactly as the inline version.
const RS_TILED = __RS_TILED__;
const RS_DECK_LAYERS = style.layers.filter(l=>l.id.indexOf("roads-bridge-decks")===0).map(l=>l.id);
const map = new maplibregl.Map({container:"map", style:style, center:__CENTER__, zoom:13,
  pitch:__PITCH__, bearing:__BEARING__, maxPitch:__MAX_PITCH__,
  attributionControl:{compact:true}});
map.addControl(new maplibregl.NavigationControl({visualizePitch:true}));
map.addControl(new maplibregl.ScaleControl({maxWidth:120, unit:"metric"}), "bottom-left");
// panel mode: a full-height side panel hosts the map controls (colour-by, road filter, legend,
// host tools) and the selected road's record. Built BEFORE the controls, so they mount into it.
const _popupMode = __ROAD_POPUP_MODE__;       // "popup" (floating) or "panel" (full-height side panel)
let _sideBd=null, _sideTab=null, _sideCtl=null;
function rsPanelShow(on){                      // hide/unhide the whole panel; the map takes the space
  if(!_sideBd) return;
  document.body.classList.toggle("rs-side-hidden", !on);
  if(_sideTab) _sideTab.style.display = on ? "none" : "block";
  try{ map.resize(); }catch(e){}
}
window.rsPanelShow = rsPanelShow;
function _sideInit(){
  if(_sideBd || _popupMode!=="panel") return;
  document.body.classList.add("rs-panel");
  const sd=document.createElement("div"); sd.className="rs-side";
  sd.innerHTML='<div class="rs-side-hd"><span>'+(document.title||"Map")+'</span>'+
    '<span class="rs-side-min" title="Hide panel">&raquo;</span></div>'+
    '<div class="rs-side-q"><input type="search" placeholder="Search roads\u2026" spellcheck="false">'+
    '<div class="rs-side-q-res"></div></div>'+
    '<div class="rs-side-ctl"></div><div class="rs-side-tools"></div>'+
    '<div class="rs-side-hd rs-side-hd2"><span>Selected road</span>'+
    '<span class="rs-side-x" title="Clear selection">×</span></div>'+
    '<div class="rs-side-bd"></div>';
  document.body.appendChild(sd);
  sd.querySelector(".rs-side-x").onclick=()=>{ rsDeselect(); };
  sd.querySelector(".rs-side-min").onclick=()=>{ rsPanelShow(false); };
  _sideBd=sd.querySelector(".rs-side-bd");
  _sideCtl=sd.querySelector(".rs-side-ctl");
  // search: substring over the curated popup fields (or every public prop) — matched against each
  // field's VALUE, or its column NAME when the field is set, so "bridge" finds bridge=yes roads (no
  // value literally contains "bridge"), likewise tunnel/oneway. 30 rows max; clicking a row selects
  // the road (record + highlight, exactly like a map click) and flies to it.
  const qin=sd.querySelector(".rs-side-q input"), qres=sd.querySelector(".rs-side-q-res");
  function _sideSearch(q){
    q=(q||"").trim().toLowerCase();
    if(q.length<2){ qres.innerHTML=""; return; }
    const only=(_popupFields&&_popupFields.length)?_popupFields:null, info=[];
    const ids=rsQuery(function(p){
      const ks=only||Object.keys(p);
      for(const k of ks){ if(k[0]==="_"||k==="twoway"||k==="lvl") continue;
        const v=p[k]; if(v==null) continue; const t=(""+v).toLowerCase();
        const set=t&&t!=="nan"&&t!=="no"&&t!=="false"&&t!=="none"&&t!=="0";
        if((t!=="nan"&&t.indexOf(q)>=0)||(k.toLowerCase().indexOf(q)>=0&&set)){ info.push([k, ""+v, p.name!=null?""+p.name:""]); return true; } }
      return false;
    });
    const n=Math.min(ids.length,30); let h="";
    for(let i=0;i<n;i++){ const k=info[i][0], v=info[i][1], nm=info[i][2];
      const lab=(nm&&nm.toLowerCase()!=="nan")?nm:v;
      h+='<div class="rs-qrow" data-id="'+ids[i]+'"><b>'+lab+'</b><span>'+k+': '+v+'</span></div>'; }
    if(!ids.length) h='<div class="rs-qmore">no match</div>';
    else if(ids.length>n) h+='<div class="rs-qmore">'+ids.length+' matches \u2014 showing '+n+'</div>';
    qres.innerHTML=h;
    qres.querySelectorAll(".rs-qrow").forEach(function(r){
      r.onclick=function(){ const id=+r.dataset.id; rsSelect(id); rsFocus(id); }; });
  }
  let _qt=0;
  qin.oninput=function(){ clearTimeout(_qt); _qt=setTimeout(function(){ _sideSearch(qin.value); },250); };
  qin.onkeydown=function(e){ if(e.key==="Escape"){ qin.value=""; _sideSearch(""); } };
  rsInfoClear();
  try{ map.resize(); }catch(e){}               // #map just lost 320px to the panel
}
_sideInit();
// zoom read-out next to the scale bar
{ const zd=document.createElement("div"); zd.className="rs-zoom";
  const uz=()=>{ zd.textContent="z "+map.getZoom().toFixed(1); };
  map.on("zoom",uz); uz(); document.body.appendChild(zd); }
// 2D/3D camera: window.rsSetView3D(on) tilts to the configured camera.pitch_3d (2D also
// squares the bearing back to north); the toggle button is UI over it and follows any pitch
// change — its label shows the view it will switch TO.
const PITCH3D = __PITCH3D__;
function rsSetView3D(on){
  on ? map.easeTo({pitch:PITCH3D, duration:600}) : map.easeTo({pitch:0, bearing:0, duration:600});
  document.dispatchEvent(new CustomEvent("rs:viewchange",{detail:{view3d:!!on}}));
}
window.rsSetView3D = rsSetView3D;
map.addControl({onAdd(m){
  const d=document.createElement("div"); d.className="maplibregl-ctrl maplibregl-ctrl-group";
  const b=document.createElement("button"); b.type="button";
  b.style.cssText="font:700 11px/1 system-ui;letter-spacing:.03em";
  const upd=()=>{ b.textContent = m.getPitch()<5 ? "3D" : "2D";
                  b.title = m.getPitch()<5 ? "Tilt the view" : "Back to flat"; };
  b.onclick=()=>{ rsSetView3D(m.getPitch()<5); };
  m.on("pitchend", upd); m.on("pitch", upd); upd();
  d.appendChild(b); return d;
}, onRemove(){}});
if(_popupMode==="panel"){    // panel-reopen button: same chrome as 2D, right below it in the stack
  map.addControl({onAdd(){
    const d=document.createElement("div"); d.className="maplibregl-ctrl maplibregl-ctrl-group";
    const b=document.createElement("button"); b.type="button";
    b.style.cssText="font:700 14px/1 system-ui";
    b.textContent="\u00ab"; b.title="Show panel";
    b.onclick=()=>{ rsPanelShow(true); };
    _sideTab=d; d.style.display="none";
    d.appendChild(b); return d;
  }, onRemove(){}});
}
// base-layer switching: window.rsSetBasemap(key|index) is the API (swaps the raster source's
// tiles; the road layers stay put); the dropdown is just UI over it and stays in sync.
// A tile-less entry (blank) hides the raster layer and shows the plain background colour.
const BM_SWITCHER = __BM_SWITCHER__;
function rsSetBasemap(keyOrIdx){
  const idx = typeof keyOrIdx==="number" ? keyOrIdx
    : BASEMAPS.findIndex(b=>b.key===keyOrIdx || b.label===keyOrIdx);
  const b = BASEMAPS[idx]; if(!b) return;
  const s = map.getSource("bm");
  if(b.tiles.length && s) s.setTiles(b.tiles);
  if(map.getLayer("basemap")) map.setLayoutProperty("basemap","visibility", b.tiles.length ? "visible" : "none");
  map.setPaintProperty("bg","background-color", b.bg);
  const m = document.querySelector(".bm-menu");
  if(m) Array.from(m.children).forEach((el,i)=>el.classList.toggle("on", i===idx));
  document.dispatchEvent(new CustomEvent("rs:basemapchange",{detail:{basemap:b.key, index:idx}}));
}
window.rsSetBasemap = rsSetBasemap;
window.RS_BASEMAPS = BASEMAPS;
if(BM_SWITCHER && BASEMAPS.length > 1){
  const menu=document.createElement("div"); menu.className="bm-menu";
  BASEMAPS.forEach((b,i)=>{ const o=document.createElement("div"); o.textContent=b.label;
    if(i===0) o.className="on";
    o.onclick=()=>{ rsSetBasemap(i); menu.classList.remove("open"); };
    menu.appendChild(o); });
  const w=document.createElement("div"); w.className="bm-icon"; w.title="Base map";
  w.innerHTML="&#9638;";
  w.onclick=(e)=>{ e.stopPropagation(); menu.classList.toggle("open"); };
  document.addEventListener("click", ()=>menu.classList.remove("open"));
  document.body.appendChild(menu); document.body.appendChild(w);
}
// road-class filtering: window.rsSetClasses([...]) shows exactly those classes and hides the
// rest across every road layer; the collapsible checkbox panel is just UI over it. The class
// filter composes (AND) with the id filter from rsFilter below.
const FILTER = __FILTER__;
const _fltCbs={}, _fltBase={};
let _fltVis=null;   // Set of visible classes; null = all
let _qIds=null;     // id-set filter from rsFilter; null = off
let _bridgesOn=true;   // rsSetBridges: hide every elevated (lvl>0) road and its 3D deck ribbons
const _fltLayers=()=>map.getStyle().layers.filter(l=>l.id.indexOf("roads")===0);
map.on("load",()=>{ _fltLayers().forEach(l=>{ if(!(l.id in _fltBase)) _fltBase[l.id]=map.getFilter(l.id)||null; }); });
function _applyRoadFilters(){
  const hidden = _fltVis===null ? [] : FILTER.classes.filter(c=>!_fltVis.has(c));
  _fltLayers().forEach(l=>{
    if(!(l.id in _fltBase)) _fltBase[l.id]=map.getFilter(l.id)||null;
    let f=_fltBase[l.id];
    if(hidden.length){ const cf=["!",["in",["get",FILTER.col],["literal",hidden]]]; f=f?["all",f,cf]:cf; }
    if(!_bridgesOn){
      // decks hold nothing but bridge ribbons (and prop-less casing slabs) -> hide wholesale;
      // everything else keeps lvl<1, so ground roads and tunnels stay
      const bf = l.source==="decks" ? ["boolean",false] : ["<",["coalesce",["get","lvl"],0],1];
      f = f?["all",f,bf]:bf;
    }
    // ids exist only in the roads features — slots (labels/arrows) and decks (3D ribbons) have
    // their own id spaces, so those layers take just the class filter. In tiles mode slots share
    // the archive source, so the tile layer name is what separates them.
    const isRoads = l.source==="roads" && (!RS_TILED || l["source-layer"]==="roads");
    if(_qIds && isRoads){ const qf=["in",["id"],["literal",_qIds]]; f=f?["all",f,qf]:qf; }
    try{ map.setFilter(l.id,f); }catch(e){}
  });
  return hidden;
}
function rsSetClasses(visible){
  _fltVis=new Set(visible);
  const hidden=_applyRoadFilters();
  FILTER.classes.forEach(c=>{ if(_fltCbs[c]) _fltCbs[c].checked=_fltVis.has(c); });
  document.dispatchEvent(new CustomEvent("rs:filterchange",
    {detail:{visible:FILTER.classes.filter(c=>_fltVis.has(c)), hidden:hidden}}));
}
window.rsSetClasses = rsSetClasses;
window.RS_CLASSES = FILTER.classes;
window.RS_CLASS_COL = FILTER.col;          // the column RS_CLASSES came from (for custom UIs / stats)
window.RS_CLASS_COLORS = FILTER.swatches || {};   // class -> its baked fill colour
function rsSetBridges(on){
  _bridgesOn=!!on; _applyRoadFilters();
  const cb=document.getElementById("rs-flt-br"); if(cb) cb.checked=_bridgesOn;
  document.dispatchEvent(new CustomEvent("rs:filterchange",{detail:{bridges:_bridgesOn}}));
}
window.rsSetBridges = rsSetBridges;
// id-set queries: the baked features are a queryable table. rsQuery(p => …) returns the ids of
// the matching edges (generateId: a feature's id is its index in the source array); the verbs
// below act on any id set — filter to it, read it back as rows, or highlight it.
// every verb takes an optional `layer` argument: omitted -> the roads; an overlay's label (or
// index) -> that overlay's features. Overlay sources use generateId too, so the same id-set
// model applies — but each layer is its OWN id space: never mix ids across layers.
function _sfeats(src){ const s=map.getSource(src); return (s && s._data && s._data.features)||[]; }
function _feats(){ return _sfeats("roads"); }
// tiles mode plumbing: _side() -> the sidecar table (null while it inflates / in inline mode);
// _rprops(id) -> a road's full properties from either world; _fs() -> setFeatureState that adds
// the source-layer tiled road refs need (decks/overlays pass through untouched).
function _side(){ return (RS_TILED && window.RS_SIDE) || null; }
function _rprops(i){ const s=_side(); if(s) return s.props[i]||{};
  const f=_feats()[i]; return (f && f.properties)||{}; }
function _fs(ref, st){
  if(RS_TILED && ref.source==="roads") ref={source:"roads", sourceLayer:"roads", id:ref.id};
  map.setFeatureState(ref, st); }
function _lyr(name){   // -> {src, ov} | null; ov null = the roads
  if(name==null) return {src:"roads", ov:null};
  const i = typeof name==="number" ? name : OVERLAYS.findIndex(o=>o.label===name);
  return OVERLAYS[i] ? {src:OVERLAYS[i].source, ov:OVERLAYS[i]} : null;
}
function rsQuery(test, layer){
  const L=_lyr(layer); if(!L) return [];
  const out=[];
  const s = !L.ov && _side();
  if(s){ s.props.forEach((p,i)=>{ try{ if(test(p||{})) out.push(i); }catch(e){} }); return out; }
  _sfeats(L.src).forEach((f,i)=>{ try{ if(test(f.properties||{})) out.push(i); }catch(e){} });
  return out;
}
function rsFilter(ids, layer){   // show only these features; rsFilter(null) resets
  const L=_lyr(layer); if(!L) return;
  if(L.ov){
    const f = ids==null ? null : ["in",["id"],["literal",Array.from(ids)]];
    L.ov.layers.forEach(id=>{ if(map.getLayer(id)) try{ map.setFilter(id,f); }catch(e){} });
    document.dispatchEvent(new CustomEvent("rs:filterchange",
      {detail:{overlay:L.ov.label, ids:ids==null?null:Array.from(ids)}}));
    return;
  }
  _qIds = ids==null ? null : Array.from(ids);
  _applyRoadFilters();
  document.dispatchEvent(new CustomEvent("rs:filterchange",{detail:{ids:_qIds}}));
}
function rsGetProps(ids, layer){ // the rows behind an id set (internals stripped) — table-ready
  const L=_lyr(layer); if(!L) return [];
  const s = !L.ov && _side(), fs = s ? null : _sfeats(L.src);
  return Array.from(ids||[]).map(i=>{
    const p=(s ? s.props[i] : (fs[i]&&fs[i].properties))||{}; const r={};
    for(const k in p){ if(k[0]!=="_" && k!=="twoway" && k!=="lvl") r[k]=p[k]; }
    return r; });
}
// bridges in 3D are deck ribbons on their own source: this maps a road id to the deck slices
// of its whole chain (via the baked __rs_edges), so selection/highlight glows on the deck
// instead of the flat ground-level line
function _deckIdsForRoad(i){
  const s=map.getSource("decks"), fs=(s && s._data && s._data.features)||[];
  const out=[], key=","+i+",";
  fs.forEach((f,k)=>{ const e=f.properties && f.properties.__rs_edges;
    if(e!=null && (","+e+",").indexOf(key)>=0) out.push(k); });
  return out;
}
let _qHl=[], _qHlD=[];
const _qHlOv={};   // per-overlay highlighted ids
function rsHighlight(ids, layer){ // selection glow on an id set; rsHighlight([]) clears
  const L=_lyr(layer); if(!L) return;
  if(L.ov){
    (_qHlOv[L.ov.label]||[]).forEach(i=>map.setFeatureState({source:L.src,id:i},{select:false}));

  // so a road inside a zone stays selectable and still feeds rs:select / the sidebar.
  // (handleOverlayClick deselects the road itself BEFORE dispatching the overlay's rs:select,
  // so the sidebar isn't wiped by a trailing rs:deselect.)
  if(handleOverlayClick(e, "over")) return;
  const f = pick(e.point);
  if(!f){ if(!handleOverlayClick(e, "under")) rsDeselect(); return; }
  clearOvSel();
  if(_sel) setS(_sel,{select:false});
  _sel = hitOf(f); setS(_sel,{select:true});
  const props = _pickProps(f);
  const ovs = _ovAt(e.point);          // interactive overlays under the click (e.g. the zone)
  // structured click-data for host pages / dashboards (fires in every popup mode, incl. False)
  document.dispatchEvent(new CustomEvent("rs:select",
    {detail:{id:f.id, layer:f.layer && f.layer.id, properties:props, overlays:ovs}}));
  if(__ROAD_POPUP__){
    if(_popupMode === "panel"){ rsInfoShow(_rrows(props, _popupFields) + _ovSections(ovs)); }
    else new maplibregl.Popup({closeButton:true, maxWidth:"260px"})
      .setLngLat(e.lngLat).setHTML(_rfields(props, _popupFields) + _ovSections(ovs)).addTo(map);
  }
});
map.on("load", ()=>{ try{ map.fitBounds(__BOUNDS__,
  {padding:30, duration:0, pitch:__PITCH__, bearing:__BEARING__}); }catch(e){} });
window.map = map;
</script></body></html>
