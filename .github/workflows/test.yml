name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable + dev tools)
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Tests
        run: pytest -q

  # The one test that runs a saved map in a real browser (skipped in the matrix above,
  # where playwright isn't installed).
  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (+ headless Chromium)
        run: |
          pip install -e ".[dev]" playwright
          playwright install --with-deps chromium

      - name: Browser smoke test
        run: pytest -q tests/test_web_smoke.py
