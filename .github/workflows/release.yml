name: Release to PyPI

# Publish on a version tag (v0.2.0, …) via PyPI trusted publishing — no API token stored.
# One-time setup on pypi.org: add a "trusted publisher" for this repo/workflow
# (project: roadstyle, owner: Khoshkhah, workflow: release.yml, environment: pypi).
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write   # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
