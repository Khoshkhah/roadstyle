<!-- roadstyle UI template: report sidebar.
     A stats-forward panel injected before </body> of any saved roadstyle web map — headline
     counts, the active colour-by legend, a checkbox filter (overlay layers + road types),
     search, and a selected-road read-out. Source-agnostic: it computes everything client-side
     from the baked edges and talks to the map ONLY through the public window.rs* API + rs:*
     events (plus RS_CLASSES / RS_CLASS_COL / RS_CLASS_COLORS / RS_OVERLAYS). The base map is
     the map's own on-map switcher (build with basemap_switcher=True). Build:  python build.py  -->
<style>
#map{right:340px}
.co-ctrl,.co-lg,.ov-ctrl{display:none}   /* the sidebar owns colour-by, the legend, and the layer filter */
#rp{position:fixed;top:0;right:0;bottom:0;width:340px;box-sizing:border-box;overflow:auto;
  padding:14px 15px;font:13px/1.5 system-ui,-apple-system,sans-serif;
  --bg:#fff;--ink:#16181d;--mut:#767c88;--line:#e6e8ec;--card:#f7f8fa;--accent:#1a6bd6;
  background:var(--bg);color:var(--ink);border-left:1px solid var(--line)}
#rp[data-theme=dark]{--bg:#14171c;--ink:#e9ecf1;--mut:#8b93a1;--line:#272b33;--card:#1c2026;--accent:#5aa9f8}
.rp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.rp-top h2{margin:0;font-size:15px}
#rp-th{background:none;border:1px solid var(--line);border-radius:99px;color:var(--mut);
  cursor:pointer;font-size:13px;width:26px;height:26px;line-height:1}
#rp-th:hover,#rp-hide:hover{color:var(--accent);border-color:var(--accent)}
#rp-hide{background:none;border:1px solid var(--line);border-radius:99px;color:var(--mut);cursor:pointer;
  font-size:14px;width:26px;height:26px;line-height:1;margin-left:6px}
#rp.hidden{display:none}
#rp-show{position:fixed;top:10px;right:10px;z-index:3;display:none;background:#fff;color:#333;
  border:1px solid #ccc;border-radius:5px;width:30px;height:30px;cursor:pointer;font-size:16px;
  line-height:1;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.rp-kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.rp-kpi{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 10px}
.rp-kv{font-size:19px;font-weight:660;letter-spacing:-.3px}
.rp-kl{font-size:11px;color:var(--mut)}
#rp label.rp-lb{display:block;margin:10px 0 3px;font-weight:600;font-size:11px;color:var(--mut);
  text-transform:uppercase;letter-spacing:.04em}
#rp select,#rp-q{width:100%;box-sizing:border-box;padding:6px 8px;border:1px solid var(--line);
  border-radius:5px;background:var(--bg);color:var(--ink);font:inherit}
#rp details{border-top:1px solid var(--line);margin-top:12px;padding-top:8px}
#rp summary{cursor:pointer;font-weight:600;font-size:12px;list-style:none;user-select:none}
#rp summary::-webkit-details-marker{display:none}
#rp summary::before{content:"▸ ";color:var(--mut)}
#rp details[open]>summary::before{content:"▾ "}
#rp .rp-sec{border-top:1px solid var(--line);margin-top:12px;padding-top:8px;font-weight:600;font-size:12px}
/* colour-by legend */
#rp-legend{margin-top:6px}
.rp-lgrow{display:flex;align-items:center;gap:7px;font-size:12px;white-space:nowrap;padding:1px 0}
.rp-lgrow i{width:14px;height:8px;border-radius:2px;flex:none}
.rp-lgbar{height:10px;border-radius:3px;margin:3px 0}
.rp-lgends{display:flex;justify-content:space-between;font-size:11px;color:var(--mut)}
/* checkbox filter (overlay layers + road types) */
.rp-grp{font-size:10px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;
  margin:8px 0 3px}
.rp-chk{display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 0;font-size:12px;
  white-space:nowrap}
.rp-chk i{width:11px;height:11px;border-radius:3px;flex:none}
.rp-chk .rp-ct{margin-left:auto;color:var(--mut);font-variant-numeric:tabular-nums}
#rp-res{margin-top:6px;max-height:220px;overflow:auto}
.rp-row{padding:4px 0;border-bottom:1px solid var(--line);cursor:pointer}
.rp-row:hover{color:var(--accent)}
.rp-row span{display:block;font-size:11px;color:var(--mut)}
.rp-none,.rp-more{color:var(--mut);font-size:11px;padding:4px 0}
#rp-detail{background:var(--card);border-radius:6px;padding:8px;min-height:36px;color:var(--mut)}
#rp-detail b{color:var(--ink)}
</style>
<div id="rp" data-theme="light">
  <div class="rp-top"><h2>Report</h2>
    <span><button id="rp-th" title="Light / dark">◐</button><button id="rp-hide" title="Hide panel">»</button></span></div>

  <details open><summary>Summary</summary>
    <div class="rp-kpis" id="rp-kpis"></div></details>

  <label class="rp-lb">Colour by</label><select id="rp-co"></select>
  <details open><summary>Legend</summary><div id="rp-legend"></div></details>

  <details open><summary>Filter</summary>
    <div id="rp-ovs"></div>
    <div id="rp-cls"></div></details>

  <div class="rp-sec">Search roads</div>
  <input id="rp-q" type="search" placeholder="name, class, bridge, id…" spellcheck="false">
  <div id="rp-res"></div>

  <div class="rp-sec">Selected road</div>
  <div id="rp-detail">Click a road, or a search result.</div>
</div>
<button id="rp-show" title="Show panel">&laquo;</button>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const esc = s => (""+s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const fmt = n => (+n).toLocaleString();

  const rp = $("rp");
  $("rp-th").onclick = () => rp.dataset.theme = rp.dataset.theme === "dark" ? "light" : "dark";

  // hide / unhide the panel — the map takes the space back, a reopen button appears (like map.resize)
  function panel(show){
    rp.classList.toggle("hidden", !show);
    $("rp-show").style.display = show ? "none" : "block";
    const mp = $("map"); if (mp) mp.style.right = show ? "340px" : "0";
    try { map.resize(); } catch (e) {}
  }
  $("rp-hide").onclick = () => panel(false);
  $("rp-show").onclick = () => panel(true);

  // ── Colour by + its legend (the base map is the map's own on-map switcher) ──
  const co = $("rp-co"), OPTS = window.RS_COLOR_OPTIONS || [];
  OPTS.forEach((o, i) => co.add(new Option(o.name, i)));
  if (!OPTS.length) { co.add(new Option("(none)", "")); co.disabled = true; }
  function legendHtml(o){
    const lg = o && o.legend;
    if (lg && lg.kind === "continuous")
      return '<div class="rp-lgbar" style="background:linear-gradient(90deg,' + (lg.ramp || []).join(",") + ')"></div>'
        + '<div class="rp-lgends"><span>' + esc(lg.vmin) + '</span><span>' + esc(lg.vmax) + '</span></div>';
    if (lg && lg.kind === "categorical" && (lg.entries || []).length)
      return lg.entries.map(e => '<div class="rp-lgrow"><i style="background:' + e[1] + '"></i>' + esc(e[0]) + '</div>').join("");
    // no baked legend ⇒ the base styling is by road class: synthesize from RS_CLASSES / RS_CLASS_COLORS
    const cls = window.RS_CLASSES || [], cols = window.RS_CLASS_COLORS || {};
    return cls.length ? cls.map(c => '<div class="rp-lgrow"><i style="background:' + (cols[c] || "#888") + '"></i>' + esc(c) + '</div>').join("")
      : '<span class="rp-none">no legend</span>';
  }
  const showLegend = i => $("rp-legend").innerHTML = legendHtml(OPTS[i]);
  co.onchange = () => { rsSetColorField(+co.value); showLegend(+co.value); };
  document.addEventListener("rs:colorchange", e => { if (e.detail.index != null){ co.value = String(e.detail.index); showLegend(e.detail.index); } });
  showLegend(+(co.value || 0));

  // ── Filter: overlay layers (rsSetOverlay) then road types (rsSetClasses) ──
  const ovs = window.RS_OVERLAYS || [];
  if (ovs.length){
    const wrap = $("rp-ovs"); wrap.innerHTML = '<div class="rp-grp">Layers</div>';
    ovs.forEach(ov => {
      const lab = document.createElement("label"); lab.className = "rp-chk";
      const cb = document.createElement("input"); cb.type = "checkbox"; cb.checked = ov.visible !== false;
      cb.onchange = () => rsSetOverlay(ov.label, cb.checked); lab.appendChild(cb);
      if (ov.color){ const i = document.createElement("i"); i.style.background = ov.color; lab.appendChild(i); }
      lab.appendChild(document.createTextNode(" " + ov.label)); wrap.appendChild(lab);
      document.addEventListener("rs:overlaychange", e => { if (e.detail.overlay === ov.label) cb.checked = e.detail.visible; });
    });
  }

  function kpi(v, l){ const d = document.createElement("div"); d.className = "rp-kpi";
    d.innerHTML = '<div class="rp-kv">' + esc(v) + '</div><div class="rp-kl">' + esc(l) + '</div>';
    $("rp-kpis").appendChild(d); }

  // ── stats + road-type filter: computed once from every baked edge (rsQuery sees them all) ──
  function build(ids){
    const props = rsGetProps(ids), col = window.RS_CLASS_COL, classes = window.RS_CLASSES || [];
    const names = new Set();
    props.forEach(p => { const n = p.name; if (n != null && (""+n).trim() && (""+n).toLowerCase() !== "nan") names.add(""+n); });
    const lenKey = Object.keys(props[0] || {}).find(k => /^(length|len|dist)/i.test(k) && typeof props[0][k] === "number");
    let len = null;
    if (lenKey){ len = 0; props.forEach(p => { const v = +p[lenKey]; if (isFinite(v)) len += v; }); }
    kpi(fmt(ids.length), "edges");
    kpi(fmt(classes.length), "classes");
    kpi(fmt(names.size), "named roads");
    if (len != null) kpi(len >= 1000 ? (len/1000).toFixed(1) + " km" : Math.round(len) + " m", "total length");

    const cnt = {};
    props.forEach(p => { const c = p[col]; if (c != null && c !== "") cnt[c] = (cnt[c] || 0) + 1; });
    const cols = window.RS_CLASS_COLORS || {}, cbs = {};
    const apply = () => { const vis = classes.filter(c => cbs[c].checked);
      rsSetClasses(vis.length === classes.length ? null : vis); };
    const wrap = $("rp-cls");
    wrap.innerHTML = '<div class="rp-grp">Road type</div>';
    classes.forEach(c => {
      const lab = document.createElement("label"); lab.className = "rp-chk";
      const cb = document.createElement("input"); cb.type = "checkbox"; cb.checked = true; cb.onchange = apply; cbs[c] = cb;
      const sw = document.createElement("i"); sw.style.background = cols[c] || "#888";
      const ct = document.createElement("span"); ct.className = "rp-ct"; ct.textContent = fmt(cnt[c] || 0);
      lab.appendChild(cb); lab.appendChild(sw); lab.appendChild(document.createTextNode(" " + c)); lab.appendChild(ct);
      wrap.appendChild(lab);
    });
  }
  // rsQuery is empty until the (tiles) sidecar inflates — poll briefly, then compute once
  (function ready(n){ const ids = rsQuery(() => true);
    if (ids.length){ build(ids); return; }
    if (n > 0) setTimeout(() => ready(n - 1), 200);
  })(30);

  // ── search: substring over each edge's fields (30 rows; click = select+fly) ──
  const q = $("rp-q"), res = $("rp-res");
  let qt = 0;
  // a field counts as "set" when its value isn't a null-ish flag — so a column-NAME match only
  // fires on roads that actually have it (bridge=yes, not bridge=None)
  const isSet = v => { const t = (""+v).trim().toLowerCase();
    return t && t !== "nan" && t !== "no" && t !== "false" && t !== "none" && t !== "0"; };
  function search(s){ s = (s || "").trim().toLowerCase();
    if (s.length < 2){ res.innerHTML = ""; return; }
    const info = [];
    const ids = rsQuery(p => { for (const k in p){ if (k[0] === "_" || k === "twoway" || k === "lvl") continue;
      const v = p[k]; if (v == null) continue; const t = (""+v).toLowerCase();
      // match the VALUE as a substring, OR the column NAME when the field is set — "bridge" finds
      // bridge=yes roads (no value literally contains "bridge"), likewise tunnel / oneway / …
      if ((t !== "nan" && t.indexOf(s) >= 0) || (k.toLowerCase().indexOf(s) >= 0 && isSet(v))){
        info.push([k, ""+v, p.name != null ? ""+p.name : ""]); return true; } }
      return false; });
    const n = Math.min(ids.length, 30);
    res.innerHTML = "";
    if (!ids.length){ res.innerHTML = '<div class="rp-none">no match</div>'; return; }
    for (let i = 0; i < n; i++){ const nm = info[i][2], lab = (nm && nm.toLowerCase() !== "nan") ? nm : info[i][1];
      const d = document.createElement("div"); d.className = "rp-row";
      d.innerHTML = "<b>" + esc(lab) + "</b><span>" + esc(info[i][0]) + ": " + esc(info[i][1]) + "</span>";
      d.onclick = () => { rsSelect(ids[i]); rsFocus(ids[i]); }; res.appendChild(d); }
    if (ids.length > n){ const m = document.createElement("div"); m.className = "rp-more";
      m.textContent = ids.length + " matches — showing " + n; res.appendChild(m); }
  }
  q.oninput = () => { clearTimeout(qt); qt = setTimeout(() => search(q.value), 250); };
  q.onkeydown = e => { if (e.key === "Escape"){ q.value = ""; search(""); } };

  // ── selected-road detail: fed by rs:select whether the click came from the map or search ──
  function fieldRows(p, only){
    const ks = (only && only.length ? only : Object.keys(p))
      .filter(k => k[0] !== "_" && k !== "twoway" && k !== "lvl" && p[k] != null && p[k] !== "");
    return ks.map(k => "<b>" + esc(k) + "</b>: " + esc(p[k])).join("<br>");
  }
  document.addEventListener("rs:select", e => {
    let h = "";
    if (e.detail.overlay) h += '<span style="color:var(--mut)">' + esc(e.detail.overlay) + '</span><br>';
    h += fieldRows(e.detail.properties, e.detail.fields);
    (e.detail.overlays || []).forEach(o => { h += '<hr style="border:none;border-top:1px solid var(--line);margin:6px 0">'
      + '<span style="color:var(--mut)">' + esc(o.label) + '</span><br>' + fieldRows(o.properties, o.fields); });
    $("rp-detail").innerHTML = h;
  });
  document.addEventListener("rs:deselect", () => {
    $("rp-detail").textContent = "Click a road, or a search result.";
  });
})();
</script>
