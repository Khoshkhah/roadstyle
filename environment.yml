name: roadstyle
channels:
  - conda-forge
dependencies:
  - python=3.11
  - geopandas
  - shapely
  - folium
  - branca
  - mapclassify       # numeric classification (optional extra: numeric)
  - matplotlib        # colormaps (optional extra: numeric)
  - xyzservices       # basemap provider registry (optional extra: basemaps)
  - pytest
  - ruff
  - mypy
  - jupyterlab        # run the example notebooks in notebooks/
  - nbclient          # execute notebooks programmatically (CI / make examples)
  - pyarrow           # required by lonboard (WebGL backend)
  - pip
  - pip:
      - lonboard          # WebGL backend (optional extra: lonboard)
      - mkdocs-material   # docs site (optional extra: docs)
