site_name: roadstyle
site_description: OSM-style road/edge map styling — self-contained MapLibre, folium & lonboard maps
site_url: https://khoshkhah.github.io/roadstyle/
repo_url: https://github.com/Khoshkhah/roadstyle
repo_name: Khoshkhah/roadstyle

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Get started:
      - Usage: usage.md
      - Choosing an engine: engines.md
      - Tutorial: tutorial.md
  - Guides:
      - Manual (live maps): manual.md
      - Examples: examples.md
      - Gallery: gallery.md
      - Studio: studio.md
  - Web & frontend:
      - MapLibre web backend: web-backend.md
      - Embedding in a website: embedding.md
      - Frontend integration: frontend.md
  - Reference:
      - Parameter reference: parameters.md
      - Palettes: palettes.md
      - API: api.md
      - Comparison: comparison.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
